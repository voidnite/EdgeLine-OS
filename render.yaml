services:
  - type: web
    name: edgeline-os
    env: node
    rootDir: .
    buildCommand: "npm install"
    startCommand: "node server.mjs"
    plan: free
    envVars:
      - key: PORT
        value: "10000"
      - key: AGENT_TICK_MS
        value: "3000"
      - key: TXLINE_LIVE
        value: "true"
      - key: TXLINE_NETWORK
        value: "mainnet"
      # The following secrets must be set manually in Render dashboard
      # (never commit real values to git)
      - key: TXLINE_API_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SOLANA_WALLET
        sync: false
